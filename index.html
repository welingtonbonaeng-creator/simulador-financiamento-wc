<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acesso — SimulaPro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --azul:#0B3D91;--azul2:#1565C0;--azul3:#1976D2;--azulclaro:#E3F0FF;
  --cinza1:#F4F6FA;--cinza2:#E8ECF4;--cinza3:#C8CDD8;
  --texto:#111827;--texto2:#4B5563;--texto3:#9CA3AF;
  --sombra:0 2px 16px rgba(11,61,145,.09);--radius:12px;--radius2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:var(--cinza1);color:var(--texto);min-height:100vh;display:flex;flex-direction:column;}
header{background:#fff;padding:0 1.5rem;box-shadow:0 2px 16px rgba(11,61,145,.1);border-bottom:2px solid var(--azulclaro);}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:80px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-txt{color:#fff;font-size:14px;font-weight:600;}
.logo-sub{color:rgba(255,255,255,.55);font-size:11px;}
.badge-header{background:var(--azulclaro);color:var(--azul);font-size:11px;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:600;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--sombra);width:100%;max-width:390px;overflow:hidden;}
.card-hero{background:linear-gradient(135deg,#0B3D91,#1565C0 60%,#1976D2);padding:1.75rem 1.5rem;}
.card-hero h2{color:#fff;font-size:19px;font-weight:700;margin-bottom:4px;}
.card-hero p{color:rgba(255,255,255,.65);font-size:12px;line-height:1.5;}
.card-body{padding:1.5rem;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem;}
.field label{font-size:10px;font-weight:700;color:var(--texto2);text-transform:uppercase;letter-spacing:.05em;}
.field input{height:42px;border:1.5px solid var(--cinza2);border-radius:var(--radius2);padding:0 12px;font-size:14px;font-family:'Sora',sans-serif;background:#fff;color:var(--texto);width:100%;transition:border-color .15s,box-shadow .15s;}
.field input:focus{outline:none;border-color:var(--azul3);box-shadow:0 0 0 3px rgba(25,118,210,.11);}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--azul),var(--azul3));color:#fff;border:none;border-radius:var(--radius2);font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(11,61,145,.25);}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(11,61,145,.33);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
.msg{font-size:12px;padding:9px 12px;border-radius:var(--radius2);margin-bottom:1rem;line-height:1.5;display:none;}
.msg.er{background:#FDE8E8;color:#991B1B;border:1px solid #FCA5A5;display:block;}
.msg.ok{background:#EAF4EE;color:#14522F;border:1px solid #B5D9C3;display:block;}
.forgot{text-align:center;margin-top:.9rem;}
.forgot a{font-size:12px;color:var(--azul2);text-decoration:none;cursor:pointer;}
.forgot a:hover{text-decoration:underline;}
footer{text-align:center;padding:1.5rem;font-size:11px;color:var(--texto3);}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <img src="logo.png" alt="SimulaPro" style="height:68px;width:auto;display:block;"/>
    </div>
    <div class="badge-header">SimulaPro</div>
  </div>
</header>
<div class="wrap">
  <div class="card">
    <div class="card-hero">
      <h2>Acesso Restrito</h2>
      <p>Plataforma exclusiva para corretores credenciados.</p>
    </div>
    <div class="card-body">
      <div id="msg" class="msg"></div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <button class="btn" id="btnLogin" onclick="login()">Entrar</button>
      <div class="forgot"><a onclick="esqueciSenha()">Esqueci minha senha</a></div>
    </div>
  </div>
</div>
<footer>SimulaPro · Simulador de Financiamento Imobiliário · Uso exclusivo para corretores credenciados</footer>
<script>
const _sb=supabase.createClient(
  'https://uefnirdmhtsbpdxnonnd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZm5pcmRtaHRzYnBkeG5vbm5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNzEwOTQsImV4cCI6MjA5Nzc0NzA5NH0.eUkpLvQ0Wqz1LAUrAVuBqAPhjR3WFJZ7RaNrPLNro4s'
);

// Se já tem sessão ativa, vai direto pro simulador
(async function(){
  const {data:{session}}=await _sb.auth.getSession();
  if(session) window.location.replace('app.html');
})();

function setMsg(txt,tipo){
  const el=document.getElementById('msg');
  el.textContent=txt;
  el.className='msg '+tipo;
}

async function login(){
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=document.getElementById('btnLogin');
  if(!email||!senha){setMsg('Preencha e-mail e senha.','er');return;}
  btn.disabled=true;btn.textContent='Entrando...';
  setMsg('','');
  const {data,error}=await _sb.auth.signInWithPassword({email,password:senha});
  if(error){
    btn.disabled=false;btn.textContent='Entrar';
    const msgs={
      'Invalid login credentials':'E-mail ou senha incorretos.',
      'Email not confirmed':'Confirme seu e-mail antes de entrar.',
      'Too many requests':'Muitas tentativas. Aguarde alguns minutos e tente novamente.'
    };
    setMsg(msgs[error.message]||'Erro ao entrar. Tente novamente.','er');
    return;
  }
  await _sb.from('auth_logs').insert({
    user_id:data.user.id,
    email:data.user.email,
    action:'login',
    user_agent:navigator.userAgent
  });
  window.location.replace('app.html');
}

async function esqueciSenha(){
  const email=document.getElementById('email').value.trim();
  if(!email){setMsg('Digite seu e-mail acima primeiro.','er');return;}
  const base=window.location.href.replace('index.html','').replace(/\/$/,'')+'/';
  const {error}=await _sb.auth.resetPasswordForEmail(email,{
    redirectTo:base+'app.html'
  });
  if(error){setMsg('Erro ao enviar. Verifique o e-mail e tente novamente.','er');return;}
  setMsg('Link enviado! Verifique sua caixa de entrada.','ok');
}
</script>
</body>
</html>
