<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0B3D91"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
  </defs>

  <!-- Casa geométrica -->
  <!-- Telhado -->
  <polygon points="10,38 40,14 70,38" fill="url(#houseGrad)" rx="2"/>
  <!-- Corpo da casa -->
  <rect x="16" y="37" width="48" height="30" fill="url(#houseGrad)" rx="2"/>
  <!-- Porta -->
  <rect x="30" y="50" width="14" height="17" fill="white" opacity="0.25" rx="2"/>
  <!-- Janela -->
  <rect x="19" y="42" width="9" height="8" fill="white" opacity="0.3" rx="1"/>

  <!-- Seta de crescimento -->
  <!-- Linha da seta -->
  <polyline points="52,28 62,18 72,22" fill="none" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ponta da seta -->
  <polyline points="63,15 72,22 65,25" fill="none" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tipografia -->
  <!-- "Simula" -->
  <text x="88" y="52" font-family="'Sora', 'Inter', sans-serif" font-size="32" font-weight="500" fill="#1A1A2E" letter-spacing="-0.5">Simula</text>
  <!-- "Pro" -->
  <text x="220" y="52" font-family="'Sora', 'Inter', sans-serif" font-size="32" font-weight="700" fill="#0B3D91" letter-spacing="-0.5">Pro</text>

  <!-- Tagline -->
  <text x="89" y="58" font-family="'Sora', 'Inter', sans-serif" font-size="8.5" font-weight="500" fill="#6B7280" letter-spacing="1.5">SIMULADOR DE FINANCIAMENTO IMOBILIÁRIO</text>
</svg>
